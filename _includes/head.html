<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="X-UA-Compatible" content="ie=edge" />

<title>
  {%- if page.title and page.title != "Home" -%}
  {{ page.title }} | {{ site.title }}
  {%- else -%}
  {{ site.title }} — {{ site.description }}
  {%- endif -%}
</title>
<meta name="description" content="{{ page.description | default: site.description }}" />

<!-- Google Fonts: Playfair Display (serif) + Source Sans 3 (body) + Fira Code (mono) -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Source+Sans+3:wght@300;400;500;600&family=Fira+Code:wght@400;500&display=swap"
  rel="stylesheet" />

<!-- Stylesheet (compiled from _sass/) -->
<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />

<!-- SEO tags (jekyll-seo-tag) -->
{% seo %}
