<!DOCTYPE html>
<html lang="en">

<head>
  {% include head.html %}
</head>

<body>

  {% include nav.html %}
  {% include social.html %}

  <div class="page-wrapper">
    {{ content }}
  </div>

  {% include social-bottom.html %}
  {% include footer.html %}


  <!-- Hidden dead-page SVG template — cloned into fp-image when Socialify fails -->
  <div id="fp-dead-page" aria-hidden="true" style="display:none">
    <div class="fp-placeholder fp-dead">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 96" width="90" height="108" fill="none"
        stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">

        <!-- Page body -->
        <rect x="8" y="4" width="56" height="72" rx="5" ry="5" stroke-width="3.5" fill="var(--color-fp-bg)"
          stroke="var(--color-border)" />

        <!-- Folded corner (dog-ear) -->
        <path d="M46 4 L64 22" stroke-width="3.5" stroke="var(--color-border)" />
        <path d="M46 4 L46 22 L64 22" stroke-width="0" fill="var(--color-bg-alt)" />
        <path d="M46 4 L46 22 L64 22" stroke-width="3" stroke="var(--color-border)" fill="none"
          stroke-linejoin="round" />

        <!-- Dead X eyes -->
        <!-- left eye X -->
        <line x1="25" y1="35" x2="31" y2="41" stroke-width="3.5" />
        <line x1="31" y1="35" x2="25" y2="41" stroke-width="3.5" />
        <!-- right eye X -->
        <line x1="41" y1="35" x2="47" y2="41" stroke-width="3.5" />
        <line x1="47" y1="35" x2="41" y2="41" stroke-width="3.5" />

        <!-- Flat / sad mouth -->
        <path d="M27 55 Q36 50 45 55" stroke-width="3" fill="none" />

        <!-- Document lines (below face) -->
        <line x1="18" y1="66" x2="54" y2="66" stroke-width="2.5" opacity="0.3" />

      </svg>
      <p class="fp-dead-label">thumbnail unavailable</p>
    </div>
  </div>

  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>

</html>
