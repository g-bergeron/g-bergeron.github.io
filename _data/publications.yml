- title: "HOL Light to Isabelle/HOL translation, rebooted"
  authors: "Ghilain Bergeron, Stéphane Glondu, Sophie Tourret"
  venue: "Isabelle Workshop"
  venue_url: "https://sketis.net/isabelle/isabelle-workshop-2024"
  kind: appeared
  year: 2024
  categories: [workshop]
  abstract: |
    This paper is a report on the use of a ten-year-old proof translation
    technique from HOL Light to Isabelle/HOL. We demonstrate the
    reusability of the technique and provide a detailed account of the steps
    needed to adapt the code both to a newer version of the HOL Light kernel
    and to the translation of specific HOL Light theorems. Thus, in addition
    to the proof of reusability, this paper provides a guideline for anyone
    wishing to use HOL Light theorems in Isabelle/HOL.
  links:
    - label: Paper
      url: "https://members.loria.fr/sophie.tourret/papers/isabelle24translation.pdf"
  tags: [Isabelle/HOL, HOL Light, Automatic Proof Translation]