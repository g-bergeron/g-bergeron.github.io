- title: "Towards a verified compiler for Distributed PlusCal (extended)"
  authors: "Ghilain Bergeron, Horatiu Cirstea, Stephan Merz"
  venue: "Journal of Logical and Algebraic Methods in Programming"
  venue_url: "https://www.sciencedirect.com/journal/journal-of-logical-and-algebraic-methods-in-programming"
  kind: to appear
  year: 2026
  categories: [journal]
  abstract: |
    Formal verification techniques are frequently used to ensure correctness properties of distributed systems and algorithms. 
    However, languages used for formal modeling and verification are often substantially different from languages used in software 
    development, and verifying an abstract representation of an algorithm does not ensure that its handwritten 
    implementation will be correct. This paper presents work in progress on a verified compiler for an extension of Lamport's PlusCal
    with threads and communication channels. Its syntax and semantics are formalized in the Lean 4 proof assistant and the passes 
    compiling PlusCal algorithms into Go code are implemented in the underlying Lean 4 programming language. This paper gives formal 
    semantics for the first pass of the compiler and outlines its mechanically verified correctness proof.
  # links:
  #   - label: Paper 
  #     url: ""
  tags: [Compilation, Formal Verification, Lean 4, PlusCal, Distributed Algorithms, Rewriting]

- title: "BARReL: A modern backend for Atelier B in Lean"
  authors: "Ghilain Bergeron, Vincent Trélat"
  venue: ""
  kind: submitted
  year: 2026
  categories: [preprint]
  abstract: | 
    BARReL is a Lean 4 library bridging Atelier B, an industrial tool for the B method, and the Lean proof assistant by 
    enabling users to conduct their formal B developments—up to machine refinement and implementation—interactively 
    inside Lean, while retaining standard B syntax.
    B partial operators are carefully encoded by generating explicit well-definedness conditions, leveraging Lean's dependent 
    types to enforce a well-definedness discipline by construction.
    That is, proof obligations and proof steps cannot silently rely on ill-typed or ill-defined instantiations.
    BARReL also features basic automation to try to discharge such well-definedness conditions automatically.
    The implementation is written entirely using Lean meta-programming and is designed to be modular: extending the supported B 
    fragment typically requires only adding new syntax and encoding clauses.
    We illustrate the approach on a small but representative case study, and argue that BARReL can act as a stepping stone towards 
    a strongly reliable Atelier B toolchain grounded in the Lean proof assistant.
  tags: [Lean 4, B Method, Metaprogramming]
  links:
    - label: Preprint
      url: "https://arxiv.org/abs/2606.20121"

- title: "BARReL: un backend moderne pour Atelier B dans Lean"
  authors: "Ghilain Bergeron, Vincent Trélat"
  venue: "Approches Formelles pour l'Assistance au Développement de Logiciels (AFADL)"
  venue_url: "https://afadl2026.sciencesconf.org/"
  kind: appeared
  year: 2026
  categories: [conference]
  abstract: |
    BARReL est une bibliothèque Lean 4 qui fait le lien entre Atelier B, un outil
    industriel pour la méthode B, et l'assistant à la preuve Lean, en permettant aux
    utilisateurs de mener leurs développements formels en B---du raffinement des
    machines jusqu'à l'implémentation---de manière interactive dans Lean, tout en
    conservant la syntaxe standard de B. Les opérateurs partiels de B sont encodés
    soigneusement en générant des conditions explicites de bonne définition, en
    tirant parti des types dépendants de Lean pour imposer, par construction, une
    discipline de bonne définition. Autrement dit, les obligations de preuve et les
    étapes de preuve ne peuvent pas reposer implicitement sur des objets mal typés
    ou mal définis. BARReL propose aussi une automatisation de base pour tenter de
    décharger automatiquement de telles conditions de bonne définition.
    L'implémentation utilise les fonctionnalités de métaprogrammation de Lean et est
    conçue pour être modulaire : étendre le fragment de B pris en charge revient
    généralement à ajouter de la nouvelle syntaxe et des clauses d'encodage. Nous
    illustrons l'approche sur une étude de cas représentative et affirmons que
    BARReL peut constituer une première étape vers une chaîne d'outils fiables pour
    la méthode B.
  links:
    - label: Paper
      url: "/assets/papers/BARReL-AFADL26.pdf"
  tags: [PlusCal, Join Calculus, Encoding]

- title: "Encoding Network PlusCal into the Join Calculus"
  authors: "Ghilain Bergeron"
  venue: "Approches Formelles pour l'Assistance au Développement de Logiciels (AFADL)"
  venue_url: "https://afadl2026.sciencesconf.org/"
  kind: appeared
  year: 2026
  categories: [conference]
  abstract: |
    We present a compilation scheme from Network PlusCal, a dialect of PlusCal equipped with explicit network communication primitives, to the Join Calculus. 
    This scheme maps each Network PlusCal process to a Join Calculus program that encodes local variables as local state atoms and control flow as a family of guarded reactions. 
    Mutual exclusion among non-deterministic branches of atomic blocks is enforced by a per-block nullary atom that is consumed once a branch succeeds. 
    We illustrate this scheme on a Ping-Pong example involving a server and multiple client processes.
  links:
    - label: Paper
      url: "/assets/papers/NPCal2Join-AFADL26.pdf"
    - label: Slides
      url: "/assets/slides/AFADL-2026.pdf"
  tags: [PlusCal, Join Calculus, Encoding]

- title: "Formalizing Splitting in Isabelle/HOL"
  authors: "Ghilain Bergeron, Florent Krasnopol, Sophie Tourret"
  venue: "16th International Conference on Interactive Theorem Proving (ITP)"
  venue_url: "https://icetcs.github.io/frocos-itp-tableaux25/itp/"
  kind: appeared
  year: 2025
  categories: [conference]
  abstract: |
    We describe the formalization in Isabelle/HOL of a framework for splitting, a theorem proving
    technique that extends saturation-based calculi with branching abilities. The framework preserves
    the completeness of the original calculus. We focus here on the simplest splitting model and provide
    an extension of the ordered resolution calculus with a variant of splitting called Lightweight AVATAR.
  links:
    - label: Paper 
      url: "https://hal.univ-lorraine.fr/LORIA-FM/hal-05329260v1"
    - label: DOI
      url: "https://doi.org/10.4230/LIPIcs.ITP.2025.22"
    - label: BibTeX
      url: "/assets/citations/formalizing-splitting-in-isabelle-hol.bib"
  tags: [Formal Verification, Isabelle/HOL, Saturation-Based Calculi, Splitting]

